<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>周南ナイトリンク | Night LINK 2026.7.4</title>
  <meta name="description" content="2026年7月4日（土）開催。周南初の大型マッチングイベント「周南ナイトリンク」。5月15日より申込受付スタート。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Noto+Serif+JP:wght@700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      height: 100%;
    }
    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: #0d1a2b;
      color: #fff;
      min-height: 100%;
      min-height: 100svh;
      overflow-x: hidden;
    }

    /* ===== 背景 ===== */
    .cs {
      position: relative;
      min-height: 100vh;
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px 20px 44px;
      text-align: center;
    }

    .cs__bg {
      position: fixed;
      inset: 0;
      z-index: 0;
    }
    .cs__bg img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      display: block;
    }
    .cs__bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(10, 20, 40, 0.68);
    }

    /* ===== 装飾 ===== */
    .deco {
      position: fixed;
      z-index: 1;
      pointer-events: none;
    }
    .deco--moon        { top: 3%;   right: 5%;  width: clamp(48px, 11vw, 90px);  opacity: .85; }
    .deco--light-left  { bottom: 0; left: 0;    width: clamp(70px, 18vw, 130px); opacity: .75; }
    .deco--light-right { bottom: 0; right: 0;   width: clamp(70px, 18vw, 130px); opacity: .75; }
    .deco--tree        { bottom: 0; left: 50%;  transform: translateX(-50%);
                         width: clamp(80px, 22vw, 160px); opacity: .45; }

    /* ===== コンテンツ ===== */
    .cs__content {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ロゴ：高さを制限して透明余白を排除 */
    .cs__logo {
      width: clamp(240px, 72vw, 380px);
      height: clamp(160px, 44vw, 240px);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 10px;
    }
    .cs__logo img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      object-position: center;
    }

    .cs__badge {
      display: inline-block;
      background: rgba(255,255,255,.13);
      border: 1px solid rgba(255,255,255,.35);
      backdrop-filter: blur(6px);
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding: 5px 18px;
      border-radius: 40px;
      margin-bottom: 10px;
    }

    .cs__catch {
      font-size: clamp(13px, 3.8vw, 16px);
      color: rgba(255,255,255,.88);
      letter-spacing: 0.08em;
      margin-bottom: 10px;
    }

    .cs__divider {
      width: 36px;
      height: 2px;
      background: #F5C518;
      border-radius: 2px;
      margin: 0 auto 14px;
    }

    /* ===== カウントダウン ===== */
    .cs__countdown {
      display: flex;
      gap: clamp(8px, 3vw, 20px);
      justify-content: center;
      align-items: flex-start;
      margin-bottom: 4px;
    }
    .cs__count-unit {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }
    .cs__count-num {
      font-family: 'Noto Serif JP', serif;
      font-size: clamp(30px, 9vw, 46px);
      font-weight: 700;
      line-height: 1;
      min-width: 2ch;
      text-align: center;
    }
    .cs__count-label {
      font-size: 9px;
      color: rgba(255,255,255,.55);
      letter-spacing: 0.05em;
    }
    .cs__count-sep {
      font-size: clamp(22px, 7vw, 36px);
      font-weight: 700;
      padding-top: 2px;
      color: rgba(255,255,255,.35);
      line-height: 1;
    }
    .cs__countdown-note {
      font-size: 11px;
      color: rgba(255,255,255,.5);
      margin-bottom: 14px;
    }

    /* ===== 申込開始ボタン ===== */
    .cs__open {
      background: #F5C518;
      color: #2C4B6E;
      font-size: clamp(14px, 4vw, 17px);
      font-weight: 700;
      padding: 12px 28px;
      border-radius: 40px;
      display: inline-block;
      margin-bottom: 8px;
      box-shadow: 0 4px 20px rgba(245,197,24,.38);
    }
    .cs__open-note {
      font-size: 12px;
      color: rgba(255,255,255,.65);
      margin-bottom: 16px;
    }

    /* ===== 概要カード ===== */
    .cs__info {
      background: rgba(255,255,255,.10);
      border: 1px solid rgba(255,255,255,.18);
      backdrop-filter: blur(10px);
      border-radius: 14px;
      padding: 14px 20px;
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      gap: 7px;
    }
    .cs__info-row {
      display: flex;
      align-items: baseline;
      gap: 10px;
      font-size: clamp(11px, 3.2vw, 13px);
      color: rgba(255,255,255,.9);
      text-align: left;
    }
    .cs__info-label {
      font-weight: 700;
      color: #F5C518;
      flex-shrink: 0;
      font-size: clamp(10px, 2.8vw, 12px);
      min-width: 3em;
    }

    /* ===== フッター ===== */
    .cs__footer {
      position: fixed;
      bottom: 12px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 10px;
      color: rgba(255,255,255,.28);
      z-index: 2;
    }
  </style>
</head>
<body>
  <div class="cs">
    <div class="cs__bg">
      <img src="assets/part1.jpg" alt="" aria-hidden="true">
    </div>
    <img src="assets/part_tsuki.png"  alt="" class="deco deco--moon"        aria-hidden="true">
    <img src="assets/part_light1.png" alt="" class="deco deco--light-left"  aria-hidden="true">
    <img src="assets/part_light2.png" alt="" class="deco deco--light-right" aria-hidden="true">
    <img src="assets/part_tree.png"   alt="" class="deco deco--tree"        aria-hidden="true">

    <div class="cs__content">
      <div class="cs__logo">
        <img src="assets/part_title.png" alt="周南ナイトリンク">
      </div>

      <span class="cs__badge">Coming Soon</span>
      <p class="cs__catch">この夜が、はじまりになる。</p>
      <div class="cs__divider"></div>

      <div class="cs__countdown">
        <div class="cs__count-unit">
          <span class="cs__count-num" id="cd-days">--</span>
          <span class="cs__count-label">DAYS</span>
        </div>
        <span class="cs__count-sep">:</span>
        <div class="cs__count-unit">
          <span class="cs__count-num" id="cd-hours">--</span>
          <span class="cs__count-label">HOURS</span>
        </div>
        <span class="cs__count-sep">:</span>
        <div class="cs__count-unit">
          <span class="cs__count-num" id="cd-mins">--</span>
          <span class="cs__count-label">MINS</span>
        </div>
        <span class="cs__count-sep">:</span>
        <div class="cs__count-unit">
          <span class="cs__count-num" id="cd-secs">--</span>
          <span class="cs__count-label">SECS</span>
        </div>
      </div>
      <p class="cs__countdown-note">申込受付スタートまで</p>

      <p class="cs__open">5月15日（金）申込受付スタート！</p>
      <p class="cs__open-note">公式LINEからお申し込みいただけます</p>

      <div class="cs__info">
        <div class="cs__info-row">
          <span class="cs__info-label">開催日</span>
          <span>2026年7月4日（土）17:00〜20:00</span>
        </div>
        <div class="cs__info-row">
          <span class="cs__info-label">場所</span>
          <span>徳山駅周辺 バー・居酒屋</span>
        </div>
        <div class="cs__info-row">
          <span class="cs__info-label">対象</span>
          <span>独身男女 20代〜30代　各100名</span>
        </div>
        <div class="cs__info-row">
          <span class="cs__info-label">参加費</span>
          <span>男性 9,000円 / 女性 6,000円（税込）</span>
        </div>
      </div>
    </div>

    <p class="cs__footer">© 2026 株式会社LinkPlus</p>
  </div>

  <script>
    const target = new Date('2026-05-15T00:00:00+09:00');

    function pad(n) { return String(n).padStart(2, '0'); }

    function tick() {
      const now  = new Date();
      const diff = target - now;

      if (diff <= 0) {
        location.replace('/');
        return;
      }

      const days  = Math.floor(diff / 86400000);
      const hours = Math.floor((diff % 86400000) / 3600000);
      const mins  = Math.floor((diff % 3600000)  / 60000);
      const secs  = Math.floor((diff % 60000)    / 1000);

      document.getElementById('cd-days').textContent  = days;
      document.getElementById('cd-hours').textContent = pad(hours);
      document.getElementById('cd-mins').textContent  = pad(mins);
      document.getElementById('cd-secs').textContent  = pad(secs);
    }

    tick();
    setInterval(tick, 1000);
  </script>
</body>
</html>
